<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="paint0_linear" x1="20" y1="20" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00F0FF"/>
      <stop offset="1" stop-color="#7000FF"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Outer Ring -->
  <circle cx="100" cy="100" r="90" stroke="url(#paint0_linear)" stroke-width="2" stroke-dasharray="10 5" opacity="0.3"/>
  
  <!-- Hexagonal Core -->
  <path d="M100 30L160.622 65V135L100 170L39.3782 135V65L100 30Z" stroke="url(#paint0_linear)" stroke-width="4" filter="url(#glow)"/>
  
  <!-- Inner Neural/Geospatial Pattern -->
  <circle cx="100" cy="100" r="40" stroke="url(#paint0_linear)" stroke-width="1" opacity="0.5"/>
  <path d="M100 60V140M60 100H140" stroke="url(#paint0_linear)" stroke-width="1" opacity="0.5"/>
  
  <!-- Pulse Points -->
  <circle cx="100" cy="60" r="3" fill="#00F0FF">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
  </circle>
  <circle cx="140" cy="100" r="3" fill="#7000FF">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="0.5s" repeatCount="indefinite" />
  </circle>
  <circle cx="100" cy="140" r="3" fill="#00F0FF">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="1s" repeatCount="indefinite" />
  </circle>
  <circle cx="60" cy="100" r="3" fill="#7000FF">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" begin="1.5s" repeatCount="indefinite" />
  </circle>
  
  <!-- Central Earth Node -->
  <circle cx="100" cy="100" r="15" fill="url(#paint0_linear)" filter="url(#glow)"/>
</svg>
